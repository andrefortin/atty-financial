# CI/CD Pipeline - Staging Deployment
# Deploys to Firebase Hosting and Cloud Functions for staging environment

name: Deploy to Staging

on:
  push:
    branches: [staging, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
      skip_tests:
        description: 'Skip tests (not recommended)'
        required: false
        default: false
        type: boolean

env:
  NODE_VERSION: '18'
  FIREBASE_PROJECT_ID: 'atty-financial-staging'

jobs:
  # ========================================
  # Job 1: Validate Environment
  # ========================================
  validate-env:
    name: Validate Staging Environment
    runs-on: ubuntu-latest
    outputs:
      valid: ${{ steps.validation.outputs.valid }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate staging environment variables
        id: validation
        run: |
          npm run validate-env:staging
          echo "valid=true" >> $GITHUB_OUTPUT
        continue-on-error: false

  # ========================================
  # Job 2: Run Tests (unless skipped)
  # ========================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    if: ${{ !github.event.inputs.skip_tests }}
    needs: validate-env

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Run type check
        run: npx tsc --noEmit

      - name: Run all tests
        run: npm run test:ci

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/coverage-final.json
          flags: unittests
          name: codecov-staging

  # ========================================
  # Job 3: Build Application
  # ========================================
  build:
    name: Build for Staging
    runs-on: ubuntu-latest
    needs: [validate-env]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env.staging from secrets
        run: |
          cat << EOF > .env.staging
          # Application
          NODE_ENV=production
          VITE_APP_ENV=staging
          VITE_APP_VERSION=${{ github.sha }}

          # Firebase
          VITE_FIREBASE_API_KEY=${{ secrets.STAGING_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.STAGING_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID=${{ env.FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.STAGING_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.STAGING_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID=${{ secrets.STAGING_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID=${{ secrets.STAGING_FIREBASE_MEASUREMENT_ID }}
          VITE_FIREBASE_USE_EMULATOR=false
          VITE_FIREBASE_ANALYTICS_ENABLED=true

          # BankJoy API
          VITE_BANKJOY_API_URL=${{ secrets.STAGING_BANKJOY_API_URL }}
          VITE_BANKJOY_API_KEY=${{ secrets.STAGING_BANKJOY_API_KEY }}
          VITE_BANKJOY_API_TIMEOUT=30000
          VITE_BANKJOY_MAX_RETRIES=3
          VITE_BANKJOY_RATE_LIMIT_ENABLED=true

          # Feature Flags
          VITE_FEATURE_BANK_INTEGRATION_ENABLED=${{ secrets.STAGING_FEATURE_BANK_INTEGRATION_ENABLED || 'true' }}
          VITE_FEATURE_AUTO_ALLOCATE_ENABLED=${{ secrets.STAGING_FEATURE_AUTO_ALLOCATE_ENABLED || 'true' }}
          VITE_FEATURE_EMAIL_NOTIFICATIONS_ENABLED=${{ secrets.STAGING_FEATURE_EMAIL_NOTIFICATIONS_ENABLED || 'true' }}
          VITE_FEATURE_SSO_ENABLED=${{ secrets.STAGING_FEATURE_SSO_ENABLED || 'true' }}
          VITE_FEATURE_MULTI_TENANT_ENABLED=${{ secrets.STAGING_FEATURE_MULTI_TENANT_ENABLED || 'true' }}
          VITE_FEATURE_ADVANCED_REPORTING_ENABLED=${{ secrets.STAGING_FEATURE_ADVANCED_REPORTING_ENABLED || 'true' }}
          VITE_FEATURE_API_ACCESS_ENABLED=${{ secrets.STAGING_FEATURE_API_ACCESS_ENABLED || 'true' }}
          VITE_FEATURE_WEBHOOKS_ENABLED=${{ secrets.STAGING_FEATURE_WEBHOOKS_ENABLED || 'true' }}
          VITE_FEATURE_BULK_IMPORT_ENABLED=${{ secrets.STAGING_FEATURE_BULK_IMPORT_ENABLED || 'true' }}
          VITE_FEATURE_CUSTOM_FIELDS_ENABLED=${{ secrets.STAGING_FEATURE_CUSTOM_FIELDS_ENABLED || 'true' }}
          VITE_FEATURE_AI_INSIGHTS_ENABLED=${{ secrets.STAGING_FEATURE_AI_INSIGHTS_ENABLED || 'true' }}
          VITE_FEATURE_PREDICTIVE_ANALYTICS_ENABLED=${{ secrets.STAGING_FEATURE_PREDICTIVE_ANALYTICS_ENABLED || 'true' }}

          # Analytics
          VITE_GA4_MEASUREMENT_ID=${{ secrets.STAGING_GA4_MEASUREMENT_ID }}
          VITE_SEGMENT_WRITE_KEY=${{ secrets.STAGING_SEGMENT_WRITE_KEY }}
          VITE_MIXPANEL_TOKEN=${{ secrets.STAGING_MIXPANEL_TOKEN }}

          # API
          VITE_API_URL=${{ secrets.STAGING_API_URL }}
          VITE_API_TIMEOUT=30000

          # Security
          VITE_CSP_ENABLED=true
          VITE_X_FRAME_OPTIONS=SAMEORIGIN
          VITE_CONTENT_SECURITY_POLICY=upgrade-insecure-requests

          # Performance
          VITE_ENABLE_SERVICE_WORKER=true
          VITE_CACHE_STRATEGY=stale-while-revalidate
          VITE_OFFLINE_ENABLED=true

          # Logging & Monitoring
          VITE_SENTRY_DSN=${{ secrets.STAGING_SENTRY_DSN }}
          VITE_SENTRY_ENVIRONMENT=staging
          VITE_LOG_LEVEL=debug

          # Rate Limiting
          VITE_RATE_LIMIT_ENABLED=true
          VITE_RATE_LIMIT_MAX_REQUESTS=200
          VITE_RATE_LIMIT_WINDOW_MS=60000

          # Support
          VITE_SUPPORT_EMAIL=${{ secrets.SUPPORT_EMAIL }}
          VITE_SUPPORT_PHONE=${{ secrets.SUPPORT_PHONE }}
          VITE_DOCS_URL=https://docs-staging.attyfinancial.com
          VITE_STATUS_PAGE_URL=https://status-staging.attyfinancial.com

          # Debug Mode (enabled for staging)
          VITE_DEBUG_MODE=true
          VITE_DEVTOOLS=true
          VITE_VERBOSE_LOGGING=true
          EOF

      - name: Build for staging
        run: npm run build:staging

      - name: Display build artifacts
        run: |
          echo "## Staging Build Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          du -sh dist/* | sort -h | awk '{print "- " $2 ": " $1}' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Build commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: staging-build-artifacts
          path: dist/
          retention-days: 7

  # ========================================
  # Job 4: Deploy to Firebase Hosting
  # ========================================
  deploy-hosting:
    name: Deploy to Firebase Hosting (Staging)
    runs-on: ubuntu-latest
    needs: [build, test]
    environment:
      name: staging
      url: https://staging.attyfinancial.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: staging-build-artifacts
          path: dist/

      - name: Authenticate with Firebase
        run: |
          echo "${{ secrets.FIREBASE_TOKEN }}" | firebase login:ci --token "${{ secrets.FIREBASE_TOKEN }}"

      - name: Set Firebase project
        run: firebase use ${{ env.FIREBASE_PROJECT_ID }}

      - name: Deploy to Firebase Hosting
        run: |
          firebase deploy --only hosting \
            --project ${{ env.FIREBASE_PROJECT_ID }} \
            --message "Deploy ${{ github.sha }} to staging"

      - name: Extract deployment URL
        id: deployment
        run: |
          # Firebase hosting URL
          echo "url=https://${{ env.FIREBASE_PROJECT_ID }}.web.app" >> $GITHUB_OUTPUT

      - name: Comment deployment URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = 'https://${{ env.FIREBASE_PROJECT_ID }}.web.app';
            const comment = `### 🚀 Staging Deployment Complete\n\n**URL:** ${url}\n\n**Commit:** ${{ github.sha }}\n**Branch:** ${{ github.ref_name }}\n\n deployed at: ${new Date().toISOString()}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  # ========================================
  # Job 5: Deploy Cloud Functions
  # ========================================
  deploy-functions:
    name: Deploy Cloud Functions (Staging)
    runs-on: ubuntu-latest
    needs: [build, test]
    environment:
      name: staging
      url: https://staging.attyfinancial.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          cd functions && npm ci

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Build Cloud Functions
        run: npm run build --prefix functions

      - name: Authenticate with Firebase
        run: |
          echo "${{ secrets.FIREBASE_TOKEN }}" | firebase login:ci --token "${{ secrets.FIREBASE_TOKEN }}"

      - name: Set Firebase project
        run: firebase use ${{ env.FIREBASE_PROJECT_ID }}

      - name: Deploy Cloud Functions
        run: |
          firebase deploy --only functions \
            --project ${{ env.FIREBASE_PROJECT_ID }} \
            --message "Deploy functions for commit ${{ github.sha }} to staging"

  # ========================================
  # Job 6: Run Smoke Tests
  # ========================================
  smoke-test:
    name: Run Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-hosting]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Install test dependencies
        run: npm install -g playwright

      - name: Run smoke tests
        run: |
          npx playwright test --config=playwright.config.ts --project=chromium
        continue-on-error: true

  # ========================================
  # Job 7: Deployment Summary
  # ========================================
  deployment-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy-hosting, deploy-functions, smoke-test]
    if: always()

    steps:
      - name: Generate deployment summary
        run: |
          echo "## Staging Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Hosting | ${{ needs.deploy-hosting.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Cloud Functions | ${{ needs.deploy-functions.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Smoke Tests | ${{ needs.smoke-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Deployment URL:** https://${{ env.FIREBASE_PROJECT_ID }}.web.app" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY

      - name: Check deployment status
        run: |
          if [ "${{ needs.deploy-hosting.result }}" != "success" ]; then
            echo "::error::Hosting deployment failed"
            exit 1
          fi

      - name: Notify on deployment failure
        if: failure()
        run: |
          echo "::error::Staging deployment failed. Please check the logs for details."
