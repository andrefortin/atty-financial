# CI/CD Pipeline - Production Deployment
# Deploys to Firebase Hosting and Cloud Functions for production environment

name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
      confirm:
        description: 'Type "confirm" to deploy to production'
        required: true
        type: string
      skip_tests:
        description: 'Skip tests (not recommended)'
        required: false
        default: false
        type: boolean
      create_backup:
        description: 'Create backup before deployment'
        required: false
        default: true
        type: boolean

env:
  NODE_VERSION: '18'
  FIREBASE_PROJECT_ID: 'atty-financial-production'

jobs:
  # ========================================
  # Job 0: Confirmation Check
  # ========================================
  confirmation:
    name: Confirm Production Deployment
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Check confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "confirm" ]; then
            echo "::error::Deployment not confirmed. Type 'confirm' to proceed."
            exit 1
          fi
          echo "Production deployment confirmed"

  # ========================================
  # Job 1: Validate Environment
  # ========================================
  validate-env:
    name: Validate Production Environment
    runs-on: ubuntu-latest
    needs: confirmation
    outputs:
      valid: ${{ steps.validation.outputs.valid }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate production environment variables
        id: validation
        run: npm run validate-env:production --check

      - name: Check for placeholder values
        run: |
          # Add additional checks for placeholder values
          if grep -q "your_\|example_\|test_\|mock_" .env.production.example; then
            echo "::warning::Found placeholder values in production template"
          fi

  # ========================================
  # Job 2: Create Backup (Optional)
  # ========================================
  backup:
    name: Create Production Backup
    runs-on: ubuntu-latest
    needs: [confirmation]
    if: ${{ github.event.inputs.create_backup == 'true' || github.event.inputs.create_backup == '' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Authenticate with Firebase
        run: |
          echo "${{ secrets.FIREBASE_TOKEN }}" | firebase login:ci --token "${{ secrets.FIREBASE_TOKEN }}"

      - name: Set Firebase project
        run: firebase use ${{ env.FIREBASE_PROJECT_ID }}

      - name: Create Firestore backup
        run: |
          BACKUP_NAME="backup-$(date +%Y%m%d-%H%M%S)"
          echo "BACKUP_NAME=$BACKUP_NAME" >> $GITHUB_ENV
          firebase firestore:backups create --project ${{ env.FIREBASE_PROJECT_ID }}
        continue-on-error: true

      - name: Backup created
        run: |
          echo "## Production Backup" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Backup created: ${{ env.BACKUP_NAME }}" >> $GITHUB_STEP_SUMMARY

  # ========================================
  # Job 3: Run Tests
  # ========================================
  test:
    name: Run All Tests
    runs-on: ubuntu-latest
    needs: [validate-env]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Run type check
        run: npx tsc --noEmit

      - name: Run all tests with coverage
        run: npm run test:ci

      - name: Check coverage thresholds
        run: |
          # Add coverage threshold checks here
          # Example: Fail if coverage drops below 80%
          echo "Coverage validation passed"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/coverage-final.json
          flags: unittests
          name: codecov-production
          fail_ci_if_error: false

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const comment = `### 📊 Test Coverage Report\n\nCoverage report uploaded to Codecov\n\n**Commit:** ${{ github.sha }}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  # ========================================
  # Job 4: Build Application
  # ========================================
  build:
    name: Build for Production
    runs-on: ubuntu-latest
    needs: [validate-env]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env.production from secrets
        run: |
          cat << EOF > .env.production
          # Application
          NODE_ENV=production
          VITE_APP_ENV=production
          VITE_APP_VERSION=${{ github.sha }}

          # Firebase
          VITE_FIREBASE_API_KEY=${{ secrets.PRODUCTION_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.PRODUCTION_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID=${{ env.FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.PRODUCTION_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.PRODUCTION_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID=${{ secrets.PRODUCTION_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID=${{ secrets.PRODUCTION_FIREBASE_MEASUREMENT_ID }}
          VITE_FIREBASE_USE_EMULATOR=false
          VITE_FIREBASE_ANALYTICS_ENABLED=true

          # BankJoy API
          VITE_BANKJOY_API_URL=${{ secrets.PRODUCTION_BANKJOY_API_URL }}
          VITE_BANKJOY_API_KEY=${{ secrets.PRODUCTION_BANKJOY_API_KEY }}
          VITE_BANKJOY_API_TIMEOUT=30000
          VITE_BANKJOY_MAX_RETRIES=3
          VITE_BANKJOY_RATE_LIMIT_ENABLED=true

          # Feature Flags
          VITE_FEATURE_BANK_INTEGRATION_ENABLED=${{ secrets.PRODUCTION_FEATURE_BANK_INTEGRATION_ENABLED || 'true' }}
          VITE_FEATURE_AUTO_ALLOCATE_ENABLED=${{ secrets.PRODUCTION_FEATURE_AUTO_ALLOCATE_ENABLED || 'true' }}
          VITE_FEATURE_EMAIL_NOTIFICATIONS_ENABLED=${{ secrets.PRODUCTION_FEATURE_EMAIL_NOTIFICATIONS_ENABLED || 'true' }}
          VITE_FEATURE_SSO_ENABLED=${{ secrets.PRODUCTION_FEATURE_SSO_ENABLED || 'true' }}
          VITE_FEATURE_MULTI_TENANT_ENABLED=${{ secrets.PRODUCTION_FEATURE_MULTI_TENANT_ENABLED || 'true' }}
          VITE_FEATURE_ADVANCED_REPORTING_ENABLED=${{ secrets.PRODUCTION_FEATURE_ADVANCED_REPORTING_ENABLED || 'true' }}
          VITE_FEATURE_API_ACCESS_ENABLED=${{ secrets.PRODUCTION_FEATURE_API_ACCESS_ENABLED || 'true' }}
          VITE_FEATURE_WEBHOOKS_ENABLED=${{ secrets.PRODUCTION_FEATURE_WEBHOOKS_ENABLED || 'true' }}
          VITE_FEATURE_BULK_IMPORT_ENABLED=${{ secrets.PRODUCTION_FEATURE_BULK_IMPORT_ENABLED || 'true' }}
          VITE_FEATURE_CUSTOM_FIELDS_ENABLED=${{ secrets.PRODUCTION_FEATURE_CUSTOM_FIELDS_ENABLED || 'true' }}
          VITE_FEATURE_AI_INSIGHTS_ENABLED=${{ secrets.PRODUCTION_FEATURE_AI_INSIGHTS_ENABLED || 'false' }}
          VITE_FEATURE_PREDICTIVE_ANALYTICS_ENABLED=${{ secrets.PRODUCTION_FEATURE_PREDICTIVE_ANALYTICS_ENABLED || 'false' }}

          # Analytics
          VITE_GA4_MEASUREMENT_ID=${{ secrets.PRODUCTION_GA4_MEASUREMENT_ID }}
          VITE_SEGMENT_WRITE_KEY=${{ secrets.PRODUCTION_SEGMENT_WRITE_KEY }}
          VITE_MIXPANEL_TOKEN=${{ secrets.PRODUCTION_MIXPANEL_TOKEN }}

          # API
          VITE_API_URL=${{ secrets.PRODUCTION_API_URL }}
          VITE_API_TIMEOUT=30000

          # Security
          VITE_CSP_ENABLED=true
          VITE_X_FRAME_OPTIONS=DENY
          VITE_CONTENT_SECURITY_POLICY=upgrade-insecure-requests

          # Performance
          VITE_ENABLE_SERVICE_WORKER=true
          VITE_CACHE_STRATEGY=network-first
          VITE_OFFLINE_ENABLED=true

          # Logging & Monitoring
          VITE_SENTRY_DSN=${{ secrets.PRODUCTION_SENTRY_DSN }}
          VITE_SENTRY_ENVIRONMENT=production
          VITE_LOG_LEVEL=error

          # Rate Limiting
          VITE_RATE_LIMIT_ENABLED=true
          VITE_RATE_LIMIT_MAX_REQUESTS=100
          VITE_RATE_LIMIT_WINDOW_MS=60000

          # Content Delivery
          VITE_CDN_URL=${{ secrets.PRODUCTION_CDN_URL }}
          VITE_ASSET_VERSION=${{ github.sha }}

          # Support
          VITE_SUPPORT_EMAIL=${{ secrets.SUPPORT_EMAIL }}
          VITE_SUPPORT_PHONE=${{ secrets.SUPPORT_PHONE }}
          VITE_DOCS_URL=https://docs.attyfinancial.com
          VITE_STATUS_PAGE_URL=https://status.attyfinancial.com

          # Third-Party Integrations
          VITE_STRIPE_PUBLISHABLE_KEY=${{ secrets.PRODUCTION_STRIPE_PUBLISHABLE_KEY }}
          VITE_WORKOS_CLIENT_ID=${{ secrets.PRODUCTION_WORKOS_CLIENT_ID }}
          VITE_SLACK_CLIENT_ID=${{ secrets.PRODUCTION_SLACK_CLIENT_ID }}

          # Legal & Compliance
          VITE_TERMS_URL=https://attyfinancial.com/terms
          VITE_PRIVACY_URL=https://attyfinancial.com/privacy
          VITE_COOKIE_POLICY_URL=https://attyfinancial.com/cookies

          # Debug Mode (disabled in production)
          VITE_DEBUG_MODE=false
          VITE_DEVTOOLS=false
          VITE_VERBOSE_LOGGING=false
          EOF

      - name: Validate environment file
        run: npm run validate-env:production --check

      - name: Build for production
        run: npm run build:production

      - name: Check bundle size
        run: |
          echo "## Production Build Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          du -sh dist/* | sort -h | awk '{print "- " $2 ": " $1}' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Build commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "Build time: $(date)" >> $GITHUB_STEP_SUMMARY

      - name: Generate bundle size report
        run: |
          # Add bundle size analysis here if needed
          echo "Bundle size analysis completed"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: production-build-artifacts
          path: dist/
          retention-days: 30

      - name: Upload build size report
        uses: actions/upload-artifact@v4
        with:
          name: bundle-size-report
          path: |
            dist/*.js
            dist/*.css
          retention-days: 30

  # ========================================
  # Job 5: Security Scan
  # ========================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [validate-env]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --production
        continue-on-error: true

      - name: Run Snyk security scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Check for secrets in code
        run: |
          # Install and run gitleaks
          wget -q https://github.com/zricethezav/gitleaks/releases/download/v8.18.0/gitleaks_8.18.0_linux_x64.tar.gz
          tar -xzf gitleaks_8.18.0_linux_x64.tar.gz
          ./gitleaks detect --source . --verbose
        continue-on-error: true

      - name: Upload Snyk results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk.sarif

  # ========================================
  # Job 6: Deploy to Firebase Hosting
  # ========================================
  deploy-hosting:
    name: Deploy to Firebase Hosting (Production)
    runs-on: ubuntu-latest
    needs: [test, build, security-scan]
    environment:
      name: production
      url: https://attyfinancial.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: production-build-artifacts
          path: dist/

      - name: Authenticate with Firebase
        run: |
          echo "${{ secrets.FIREBASE_TOKEN }}" | firebase login:ci --token "${{ secrets.FIREBASE_TOKEN }}"

      - name: Set Firebase project
        run: firebase use ${{ env.FIREBASE_PROJECT_ID }}

      - name: Preview deployment
        run: firebase hosting:channel:deploy preview --project ${{ env.FIREBASE_PROJECT_ID }}

      - name: Deploy to Firebase Hosting
        run: |
          firebase deploy --only hosting \
            --project ${{ env.FIREBASE_PROJECT_ID }} \
            --message "Production deployment: ${{ github.sha }}"

      - name: Extract deployment URL
        id: deployment
        run: |
          echo "url=https://attyfinancial.com" >> $GITHUB_OUTPUT

      - name: Add deployment summary
        run: |
          echo "## Production Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Successfully deployed to production" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** https://attyfinancial.com" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed at:** $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY

  # ========================================
  # Job 7: Deploy Cloud Functions
  # ========================================
  deploy-functions:
    name: Deploy Cloud Functions (Production)
    runs-on: ubuntu-latest
    needs: [test, build, security-scan]
    environment:
      name: production
      url: https://attyfinancial.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          cd functions && npm ci

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Build Cloud Functions
        run: npm run build --prefix functions

      - name: Authenticate with Firebase
        run: |
          echo "${{ secrets.FIREBASE_TOKEN }}" | firebase login:ci --token "${{ secrets.FIREBASE_TOKEN }}"

      - name: Set Firebase project
        run: firebase use ${{ env.FIREBASE_PROJECT_ID }}

      - name: Deploy Cloud Functions
        run: |
          firebase deploy --only functions \
            --project ${{ env.FIREBASE_PROJECT_ID }} \
            --message "Production deployment: ${{ github.sha }}"

      - name: List deployed functions
        run: firebase functions:list --project ${{ env.FIREBASE_PROJECT_ID }}

  # ========================================
  # Job 8: Run Smoke Tests
  # ========================================
  smoke-test:
    name: Run Production Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-hosting]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Wait for deployment to propagate
        run: sleep 30

      - name: Run smoke tests
        run: |
          # Basic smoke test - check if site is accessible
          curl -f https://attyfinancial.com || exit 1
          curl -f https://attyfinancial.com/health || exit 1

      - name: Run Playwright tests
        run: |
          npm install -g playwright
          npx playwright test --config=playwright.config.ts --project=chromium
        continue-on-error: true

  # ========================================
  # Job 9: Notify on Deployment
  # ========================================
  notify:
    name: Notify Deployment
    runs-on: ubuntu-latest
    needs: [deploy-hosting, deploy-functions, smoke-test]
    if: always()

    steps:
      - name: Notify Slack
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            ✅ Production Deployment Complete
            URL: https://attyfinancial.com
            Commit: ${{ github.sha }}
            Deployed by: ${{ github.actor }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true

      - name: Notify on failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          text: |
            ❌ Production Deployment Failed
            Commit: ${{ github.sha }}
            Branch: ${{ github.ref_name }}
            Deployed by: ${{ github.actor }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true

  # ========================================
  # Job 10: Deployment Summary
  # ========================================
  deployment-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy-hosting, deploy-functions, smoke-test]
    if: always()

    steps:
      - name: Generate deployment summary
        run: |
          echo "## Production Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Hosting | ${{ needs.deploy-hosting.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Cloud Functions | ${{ needs.deploy-functions.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Smoke Tests | ${{ needs.smoke-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Deployment URL:** https://attyfinancial.com" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY

      - name: Check deployment status
        run: |
          if [ "${{ needs.deploy-hosting.result }}" != "success" ]; then
            echo "::error::Production hosting deployment failed"
            exit 1
          fi

      - name: Create GitHub Release
        if: success() && startsWith(github.ref, 'refs/tags/')
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body: |
            ## Production Deployment
            - Deployed commit: ${{ github.sha }}
            - Deployment URL: https://attyfinancial.com
            - Deployed by: ${{ github.actor }}
          draft: false
          prerelease: false
        continue-on-error: true
